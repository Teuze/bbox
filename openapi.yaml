        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/backup.json
              schema:
                $ref: "#/components/schemas/WanBackup"
      summary: Retourne l'état de la connexion de secours du WAN.
      security:
        - BBOX_ID:

  /wan/diags:
    get:
      tags:
        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/diags.json
              schema:
                $ref: "#/components/schemas/WanDiags"
      summary: Retourne les résultats d'autodiagnostic de la connexion au WAN.
      security:
        - BBOX_ID:

  /wan/diags/sessions:
    get:
      tags:
        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/diags-sessions.json
              schema:
                $ref: "#/components/schemas/WanSessions"
      summary: Retourne le nombre de sessions IP actives par équipement.
      security:
        - BBOX_ID:

  /wan/ftth/stats:
    get:
      tags:
        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/ftth-stats.json
              schema:
                $ref: "#/components/schemas/WanFtth"
      summary: Retourne l'état et le mode de liaison de l'interface fibre FTTH.

  /wan/ip:
    get:
      tags:
        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/ip.json
              schema:
                $ref: "#/components/schemas/WanIp"
      summary: Retourne les informations IP de la connexion Internet.

  /wan/ip/stats:
    get:
      tags:
        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/ip-stats.json
              schema:
                $ref: "#/components/schemas/WanIpStats"
      summary: Retourne les statistiques de trafic de la connexion Internet.

  /wan/sfp:
    get:
      tags:
        - wan
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wan/sfp.json
              schema:
                $ref: "#/components/schemas/WanSfp"
      summary: Retourne les informations techniques du module SFP fibre.

  /wireless:
    get:
      tags:
        - wireless
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wireless/_.json
              schema:
                $ref: "#/components/schemas/Wireless"
      summary: Retourne la configuration complète du Wi-Fi.
      security:
        - BBOX_ID:

  /wireless/acl:
    get:
      tags:
        - wireless
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wireless/acl.json
              schema:
                $ref: "#/components/schemas/WirelessAcl"
      summary: Retourne la liste des règles de contrôle d'accès au Wi-Fi.
      security:
        - BBOX_ID:

  /wireless/deactivation:
    get:
      tags:
        - wireless
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wireless/deactivation.json
              schema:
                $ref: "#/components/schemas/WirelessDeactivation"
      summary: Retourne l'état de la minuterie d'extinction temporaire du Wi-Fi.
      security:
        - BBOX_ID:

  /wireless/repeater:
    get:
      tags:
        - wireless
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wireless/repeater.json
              schema:
                $ref: "#/components/schemas/WirelessRepeater"
      summary: Retourne la liste des répéteurs Wi-Fi associés à la Bbox.
      security:
        - BBOX_ID:

  /wireless/scheduler:
    get:
      tags:
        - wireless
      responses:
        '200':
          content:
            application/json:
              examples:
                success:
                  externalValue: ./examples/wireless/scheduler.json
              schema:
                $ref: "#/components/schemas/WirelessScheduler"
      summary: Retourne la configuration du contrôle horaire de la Wi-Fi.
      security:
        - BBOX_ID:

